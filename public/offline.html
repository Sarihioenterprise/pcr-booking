<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PCR Booking — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F8F9FC;
      color: #0c0c1c;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 420px;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      border-radius: 16px;
      background: #2EBD6B;
      color: white;
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 2rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    p {
      color: #6b7280;
      line-height: 1.6;
    }
    .retry {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.625rem 1.5rem;
      background: #2EBD6B;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .retry:hover { background: #1a9952; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">PCR</div>
    <h1>You're offline</h1>
    <p>Please check your internet connection and try again.</p>
    <a href="/" class="retry" onclick="location.reload(); return false;">Retry</a>
  </div>
</body>
</html>
